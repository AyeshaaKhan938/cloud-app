name: vmfs_app
description: VMFS USA — age verification and lottery lookup for vending machines.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.4.0
  image_picker: ^1.1.2
  go_router: ^15.1.2
  app_links: ^6.4.0
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icons/app_icon.png
  adaptive_icon_background: "#002244"
  adaptive_icon_foreground: assets/icons/app_icon.png
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/icons/app_icon.png
